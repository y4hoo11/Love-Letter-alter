# love_letter_online_alter
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>オンライン・ラブレター</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #2c3e50; color: #ecf0f1; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        h1 { color: #f1c40f; margin-bottom: 5px; }
        #setup-container, #game-container { width: 100%; max-width: 500px; background: #34495e; padding: 20px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); margin-bottom: 15px; }
        .input-group { margin-bottom: 15px; }
        input, button { width: 100%; padding: 10px; box-sizing: border-box; border-radius: 5px; border: none; font-size: 1rem; margin-top: 5px; }
        button { background: #2ecc71; color: white; cursor: pointer; font-weight: bold; }
        button:hover { background: #27ae60; }
        .btn-secondary { background: #3498db; }
        .btn-secondary:hover { background: #2980b9; }
        .btn-danger { background: #e74c3c; width: auto; padding: 3px 8px; font-size: 0.8rem; margin: 0; margin-left: 10px; }
        .btn-danger:hover { background: #c0392b; }
        .status-panel { background: #1a252f; padding: 10px; border-radius: 5px; margin-bottom: 15px; font-size: 0.9rem; display: flex; justify-content: space-between; }
        .player-item { display: flex; justify-content: space-between; align-items: center; padding: 8px; border-bottom: 1px solid #34495e; background: #2c3e50; margin-bottom: 5px; border-radius: 3px; }
        .player-item.active { border: 2px solid #2ecc71; color: #2ecc71; font-weight: bold; }
        .player-item.eliminated { color: #e74c3c; text-decoration: line-through; opacity: 0.6; }
        .log-box { height: 120px; overflow-y: auto; background: #1a252f; padding: 10px; border-radius: 5px; font-size: 0.85rem; margin-bottom: 15px; border: 1px solid #7f8c8d; }
        .card-area { display: flex; justify-content: center; gap: 15px; margin-top: 15px; min-height: 160px; }
        .card { width: 110px; height: 160px; background: #e74c3c; border: 2px solid #fff; border-radius: 8px; display: flex; flex-direction: column; justify-content: space-between; padding: 8px; cursor: pointer; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        .card:hover { transform: translateY(-5px); }
        .card-num { font-size: 1.4rem; font-weight: bold; }
        .card-name { font-size: 1rem; text-align: center; font-weight: bold; }
        .card-effect { font-size: 0.65rem; background: rgba(0,0,0,0.2); padding: 3px; border-radius: 3px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 100; }
        .modal-content { background: #34495e; padding: 20px; border-radius: 10px; text-align: center; max-width: 300px; width: 80%; }
        .modal button { margin: 5px 0; }
    </style>
</head>
<body>

<h1>ラブレター オンライン</h1>
<div id="my-peer-id" style="font-size: 0.8rem; color: #bdc3c7; margin-bottom: 10px;">接続準備中...</div>

<div id="setup-container">
    <div class="input-group">
        <label>あなたの名前:</label>
        <input type="text" id="name-input" value="プレイヤー">
    </div>
    <div class="input-group" id="host-setup">
        <button onclick="beHost()">親（ホスト）として部屋を作る</button>
    </div>
    <hr style="border: 0; border-top: 1px solid #7f8c8d; margin: 20px 0;">
    <div class="input-group">
        <label>参加する部屋のID (ホストのID):</label>
        <input type="text" id="room-id-input" placeholder="ここにホストのIDを貼り付け">
        <button class="btn-secondary" style="margin-top: 10px;" onclick="joinRoom()">子（ゲスト）として参加する</button>
    </div>
</div>

<div id="game-container" style="display: none;">
    <div class="status-panel">
        <span id="deck-count">山札: --枚</span>
        <span id="role-display" style="color: #f1c40f;">-</span>
    </div>
    <div id="player-list"></div>
    <button id="start-game-btn" style="display: none; margin: 10px 0;" onclick="hostStartGame()">ゲームを開始する</button>
    
    <div class="log-box" id="log-box"></div>
    
    <h3 id="hand-title" style="text-align:center; margin: 10px 0; display:none;">あなたの手札</h3>
    <div class="card-area" id="card-area"></div>
</div>

<div id="target-modal" class="modal"><div class="modal-content"><h3 id="modal-title">対象選択</h3><div id="target-buttons"></div></div></div>

<script>
const CARD_DATA = {
    1: { name: "兵士", effect: "相手を指名し手札を予想。当たれば脱落させる" },
    2: { name: "僧侶", effect: "次の自分の手番まで効果を受けない" },
    3: { name: "騎士", effect: "相手と手札を比較し、低い方を脱落させる" },
    4: { name: "魔術師", effect: "相手の手札を捨てさせ、1枚引かせる" },
    5: { name: "将軍", effect: "相手と手札を交換する" },
    8: { name: "姫", effect: "手札から捨てると即脱落する" }
};
const ORIGINAL_DECK = [1,1,1,1,1, 2,2, 3,3, 4,4, 5, 8]; 

let peer = null;
let connections = []; 
let connToHost = null; 
let isHost = false;
let myId = "";
let myName = "";

let gameState = {
    started: false,
    deck: [],
    players: [], 
    turnIndex: 0,
    logs: []
};

peer = new Peer({
    config: { 'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }] }
});

peer.on('open', (id) => {
    myId = id;
    document.getElementById('my-peer-id').innerText = `あなたの通信ID: ${id} (タップでコピー)`;
});

peer.on('error', (err) => {
    alert("通信エラーが発生しました: " + err.type);
    console.error(err);
});

document.getElementById('my-peer-id').onclick = () => {
    navigator.clipboard.writeText(myId);
    alert("IDをコピーしました！友達に送ってください。");
};

function beHost() {
    isHost = true;
    myName = document.getElementById('name-input').value;
    gameState.players = [{ peerId: myId, name: myName, hand: [], alive: true, protected: false }];
    
    document.getElementById('setup-container').style.display = 'none';
    document.getElementById('game-container').style.display = 'block';
    document.getElementById('start-game-btn').style.display = 'block';
    document.getElementById('role-display').innerText = "部屋の主 (ホスト)";
    
    peer.on('connection', (conn) => {
        // すでにゲームが始まっていたら拒否
        if (gameState.started) {
            setTimeout(() => { conn.send({ type: 'KICK', msg: 'すでにゲームが開始されています。' }); }, 500);
            return;
        }
        connections.push(conn);
        conn.on('data', (data) => handleDataFromGuest(data, conn));
        conn.on('close', () => handleDisconnect(conn.peer));
    });
    pushLog("🏠 部屋を作成しました。誰かが入るのを待っています...");
    updateUI();
}

function joinRoom() {
    const hostId = document.getElementById('room-id-input').value.trim();
    if(!hostId) return alert("ホストのIDを入力してください");
    myName = document.getElementById('name-input').value;
    
    connToHost = peer.connect(hostId);
    
    connToHost.on('open', () => {
        document.getElementById('setup-container').style.display = 'none';
        document.getElementById('game-container').style.display = 'block';
        document.getElementById('role-display').innerText = "ゲスト参加中";
        connToHost.send({ type: 'JOIN', name: myName });
    });
    
    connToHost.on('data', (data) => {
        if (data.type === 'SYNC') {
            gameState = data.state;
            updateUI();
        }
        if (data.type === 'ALERT') alert(data.msg);
        if (data.type === 'KICK') {
            alert(data.msg || "ホストによって部屋から退出させられました。");
            resetToSetup();
        }
    });

    connToHost.on('close', () => {
        alert("ホストとの接続が切れました。");
        resetToSetup();
    });

    setTimeout(() => {
        if (document.getElementById('setup-container').style.display !== 'none') {
            alert("ホストに接続できませんでした。");
        }
    }, 5000);
}

// 初期画面（ロビー）に戻る処理
function resetToSetup() {
    gameState.started = false;
    gameState.players = [];
    if(connToHost) { connToHost.close(); connToHost = null; }
    document.getElementById('setup-container').style.display = 'block';
    document.getElementById('game-container').style.display = 'none';
    document.getElementById('role-display').innerText = "-";
}

// 【ホスト限定】プレイヤーをキックする関数
function kickPlayer(targetPeerId, targetName) {
    if (!isHost) return;
    if (confirm(`${targetName} さんをキックしますか？`)) {
        // 対象のコネクションを探して通知を送り、切断する
        const connIdx = connections.findIndex(c => c.peer === targetPeerId);
        if (connIdx !== -1) {
            connections[connIdx].send({ type: 'KICK', msg: 'ホストによってキックされました。' });
            connections[connIdx].close();
            connections.splice(connIdx, 1);
        }
        // プレイヤーリストから削除
        gameState.players = gameState.players.filter(p => p.peerId !== targetPeerId);
        pushLog(`👢 ${targetName} がホストによってキックされました。`);
        
        // もしゲーム中にキックした場合のターン補正
        if (gameState.started) {
            if (gameState.turnIndex >= gameState.players.length) {
                gameState.turnIndex = 0;
            }
        }
        broadcastState();
    }
}

// 通信が自然に切れた場合の処理
function handleDisconnect(peerId) {
    const player = gameState.players.find(p => p.peerId === peerId);
    if (player) {
        pushLog(`🔌 ${player.name} の接続が切れました。`);
        if (gameState.started) {
            player.alive = false; // ゲーム中は脱落扱いにする
        } else {
            gameState.players = gameState.players.filter(p => p.peerId !== peerId); // 開始前ならリストから消す
        }
        broadcastState();
    }
}

function handleDataFromGuest(data, conn) {
    if (data.type === 'JOIN') {
        if(!gameState.players.some(p => p.peerId === conn.peer)) {
            gameState.players.push({ peerId: conn.peer, name: data.name, hand: [], alive: true, protected: false });
            pushLog(`👥 ${data.name} が参加しました。`);
        }
        broadcastState();
    }
    if (data.type === 'ACTION') {
        resolveAction(data.action);
    }
}

function broadcastState() {
    connections.forEach(conn => {
        if(conn.open) conn.send({ type: 'SYNC', state: gameState });
    });
    updateUI();
}

function pushLog(msg) {
    gameState.logs.push(msg);
    if(gameState.logs.length > 20) gameState.logs.shift();
}

function hostStartGame() {
    if(gameState.players.length < 2) return alert("2人以上いないと始められません！");
    document.getElementById('start-game-btn').style.display = 'none';
    
    gameState.started = true;
    gameState.deck = [...ORIGINAL_DECK].sort(() => Math.random() - 0.5);
    gameState.deck.pop(); 
    
    gameState.players.forEach(p => {
        p.hand = [gameState.deck.pop()];
        p.alive = true;
        p.protected = false;
    });
    
    gameState.turnIndex = 0;
    pushLog("💖 ゲームが開始されました！");
    startTurn();
}

function startTurn() {
    const alivePlayers = gameState.players.filter(p => p.alive);
    if (alivePlayers.length <= 1 || gameState.deck.length === 0) {
        endGame();
        return;
    }

    const currentPlayer = gameState.players[gameState.turnIndex];
    if (!currentPlayer.alive) {
        nextTurn();
        return;
    }

    currentPlayer.protected = false;
    currentPlayer.hand.push(gameState.deck.pop());
    broadcastState();
}

function nextTurn() {
    gameState.turnIndex = (gameState.turnIndex + 1) % gameState.players.length;
    startTurn();
}

function updateUI() {
    const logBox = document.getElementById("log-box");
    logBox.innerHTML = gameState.logs.map(l => `<div>${l}</div>`).join('');
    logBox.scrollTop = logBox.scrollHeight;

    document.getElementById("deck-count").innerText = `山札: ${gameState.deck ? gameState.deck.length : 0}枚`;

    const listEl = document.getElementById("player-list");
    listEl.innerHTML = "";
    
    gameState.players.forEach((p, idx) => {
        const isCurrent = idx === gameState.turnIndex && gameState.started;
        let statusText = p.alive ? "生存" : "❌ 脱落";
        if (p.protected) statusText += " (🛡️)";
        if (p.alive && p.peerId === myId) statusText += ` (手札:${p.hand.length}枚)`;

        const item = document.createElement("div");
        item.className = `player-item ${isCurrent ? 'active' : ''} ${!p.alive ? 'eliminated' : ''}`;
        
        // プレイヤー名と状態のエリア
        const infoSpan = document.createElement("span");
        infoSpan.innerHTML = `<span>${p.name} ${p.peerId === myId ? '(あなた)' : ''}</span> <span style="margin-left:10px; font-size:0.85rem; color:#bdc3c7;">${statusText}</span>`;
        item.appendChild(infoSpan);

        // 【キックボタンの追加】ホスト画面かつ自分以外の生存プレイヤーに設置
        if (isHost && p.peerId !== myId) {
            const kickBtn = document.createElement("button");
            kickBtn.className = "btn-danger";
            kickBtn.innerText = "❌ キック";
            kickBtn.onclick = () => kickPlayer(p.peerId, p.name);
            item.appendChild(kickBtn);
        }

        listEl.appendChild(item);
    });

    const cardArea = document.getElementById("card-area");
    cardArea.innerHTML = "";
    const me = gameState.players.find(p => p.peerId === myId);
    
    if (me && me.alive && gameState.started) {
        document.getElementById("hand-title").style.display = "block";
        const isMyTurn = gameState.players[gameState.turnIndex].peerId === myId;
        
        me.hand.forEach((cardNum, idx) => {
            const card = CARD_DATA[cardNum];
            const cardEl = document.createElement("div");
            cardEl.className = "card";
            cardEl.innerHTML = `<div class="card-num">${cardNum}</div><div class="card-name">${card.name}</div><div class="card-effect">${card.effect}</div>`;
            
            if (isMyTurn) {
                cardEl.onclick = () => selectCard(idx, cardNum);
            } else {
                cardEl.style.opacity = "0.7";
                cardEl.style.cursor = "not-allowed";
            }
            cardArea.appendChild(cardEl);
        });
    } else {
        document.getElementById("hand-title").style.display = "none";
    }
}

function selectCard(handIdx, cardNum) {
    if (cardNum === 8) { 
        sendAction({ type: 'PLAY', card: cardNum, targetId: null });
        return;
    }
    if (cardNum === 2) { 
        sendAction({ type: 'PLAY', card: cardNum, targetId: null });
        return;
    }
    showTargetModal(cardNum);
}

function showTargetModal(cardNum) {
    const modal = document.getElementById("target-modal");
    const btnContainer = document.getElementById("target-buttons");
    btnContainer.innerHTML = "";
    
    gameState.players.forEach((p, idx) => {
        if (p.peerId !== myId && p.alive && !p.protected) {
            const btn = document.createElement("button");
            btn.innerText = p.name;
            btn.onclick = () => {
                modal.style.display = "none";
                if (cardNum === 1) {
                    guessCard(p.peerId);
                } else {
                    sendAction({ type: 'PLAY', card: cardNum, targetId: p.peerId });
                }
            };
            btnContainer.appendChild(btn);
        }
    });

    if(btnContainer.innerHTML === "") {
        const btn = document.createElement("button");
        btn.innerText = "対象なし (不発)";
        btn.onclick = () => { modal.style.display = "none"; sendAction({ type: 'PLAY', card: cardNum, targetId: null }); };
        btnContainer.appendChild(btn);
    }
    modal.style.display = "flex";
}

function guessCard(targetId) {
    const modal = document.getElementById("target-modal");
    const btnContainer = document.getElementById("target-buttons");
    btnContainer.innerHTML = "<h3>手札の数字を予想：</h3>";
    
    [2, 3, 4, 5, 8].forEach(num => {
        const btn = document.createElement("button");
        btn.innerText = `${num}: ${CARD_DATA[num].name}`;
        btn.onclick = () => {
            modal.style.display = "none";
            sendAction({ type: 'PLAY', card: 1, targetId: targetId, guess: num });
        };
        btnContainer.appendChild(btn);
    });
    modal.style.display = "flex";
}

function sendAction(action) {
    if (isHost) {
        resolveAction(action);
    } else {
        connToHost.send({ type: 'ACTION', action: action });
    }
}

function resolveAction(action) {
    const attacker = gameState.players[gameState.turnIndex];
    const cardIdx = attacker.hand.indexOf(action.card);
    attacker.hand.splice(cardIdx, 1);
    
    pushLog(`📢 ${attacker.name} が 【${CARD_DATA[action.card].name}】 をプレイ。`);

    const target = gameState.players.find(p => p.peerId === action.targetId);

    if (action.card === 8) { 
        pushLog(`💀 ${attacker.name} は姫を捨てたため脱落した！`);
        attacker.alive = false;
    }
    else if (action.card === 2) { 
        attacker.protected = true;
        pushLog(`🛡️ ${attacker.name} は次の手番まで守られる。`);
    }
    else if (target && target.alive) {
        if (action.card === 1) { 
            pushLog(`🎯 ${attacker.name} は ${target.name} の手札を [${action.guess}] と予想。`);
            if (target.hand[0] === action.guess) {
                pushLog(`💥 的中！ ${target.name} が脱落。`);
                target.alive = false;
            } else {
                pushLog("❓ ハズレ！ 効果なし。");
            }
        }
        else if (action.card === 3) { 
            pushLog(`⚔️ ${attacker.name} と ${target.name} が騎士で対決！`);
            const p1 = attacker.hand[0];
            const p2 = target.hand[0];
            if (p1 > p2) {
                pushLog(`🏆 ${attacker.name} の勝利！ ${target.name} が脱落。`);
                target.alive = false;
            } else if (p1 < p2) {
                pushLog(`🏆 ${target.name} の勝利！ ${attacker.name} が脱落。`);
                attacker.alive = false;
            } else {
                pushLog("🤝 引き分け！");
            }
        }
        else if (action.card === 4) { 
            pushLog(`🌀 ${target.name} は手札【${CARD_DATA[target.hand[0]].name}】を捨てさせられた。`);
            if (target.hand[0] === 8) {
                pushLog(`💀 姫が捨てられた！ ${target.name} は脱落。`);
                target.alive = false;
            } else {
                target.hand = [];
                if (gameState.deck.length > 0) target.hand.push(gameState.deck.pop());
            }
        }
        else if (action.card === 5) { 
            pushLog(`🔄 ${attacker.name} と ${target.name} の手札が交換された。`);
            const temp = attacker.hand[0];
            attacker.hand[0] = target.hand[0];
            target.hand[0] = temp;
        }
    } else {
        if (action.targetId) pushLog("❌ 対象が不適切、またはすでに守られていたため不発。");
    }

    broadcastState();
    setTimeout(nextTurn, 2000);
}

function endGame() {
    gameState.started = false;
    pushLog("🏁 --- ゲーム終了 ---");
    let winner = null;
    let maxCard = -1;

    gameState.players.forEach(p => {
        if (p.alive) {
            const card = p.hand[0] || 0;
            pushLog(`📝 ${p.name} の手札は 【${CARD_DATA[card] ? CARD_DATA[card].name : card}】`);
            if (card > maxCard) {
                maxCard = card;
                winner = p;
            }
        }
    });

    if (winner) {
        pushLog(`🎉 勝者は 【${winner.name}】 です！おめでとう！`);
    } else {
        pushLog("🤝 生存者がおらず、引き分けです。");
    }
    
    broadcastState();
    if(isHost) document.getElementById('start-game-btn').style.display = 'block';
}
</script>
</body>
</html>
