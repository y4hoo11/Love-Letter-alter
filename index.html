<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ラブレター オンライン・カスタム</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
</head>
<body>

    <h1>🃏 LOVE LETTER CUSTOM</h1>
    <div id="my-peer-id">部屋IDを取得中...</div>

    <div id="setup-container">
        <h2>ルームセットアップ</h2>
        <div class="input-group">
            <label for="name-input">あなたのプレイヤー名:</label>
            <input type="text" id="name-input" value="プレイヤー" maxlength="10">
        </div>
        
        <div style="display: flex; gap: 10px; margin-top: 20px;">
            <button onclick="beHost()">🏠 部屋を作る (ホスト)</button>
        </div>

        <hr style="margin: 20px 0; border: 0; border-top: 1px solid #4f5d73;">

        <div class="input-group">
            <label for="room-id-input">友達の部屋ID (数字8桁):</label>
            <input type="text" id="room-id-input" placeholder="12345678" maxlength="8">
        </div>
        <button class="btn-secondary" onclick="joinRoom()">🌐 部屋に入る (ゲスト)</button>
    </div>

    <div id="game-container" style="display: none;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <h2 style="margin:0;">ゲームボード</h2>
            <button id="leave-room-btn" onclick="leaveRoom()">🚪 部屋を離脱</button>
        </div>

        <div class="status-panel">
            <span id="deck-count">山札: --枚</span>
            <span id="role-display">🟢 待機中</span>
        </div>

        <div class="player-list-container">
            <div id="player-list"></div>
        </div>

        <div id="log-box"></div>

        <h3 id="hand-title" style="display: none; margin-bottom: 5px;">あなたの手札</h3>
        <div id="card-area" class="card-area"></div>

        <button id="start-game-btn" style="display: none;" onclick="hostStartGame()">🎮 ゲーム開始</button>
        <button id="next-round-btn" style="display: none; background: #3498db;" onclick="hostNextRound()">🔄 次のラウンドへ</button>

        <div id="card-tracker-container">
            <h3 style="font-size: 0.9rem; margin-bottom: 8px;">📊 残りカードトラッカー</h3>
            <div id="card-tracker-list"></div>
        </div>
    </div>

    <div id="target-modal" class="modal">
        <div class="modal-content">
            <div id="target-buttons"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
