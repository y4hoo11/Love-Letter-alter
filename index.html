# love_letter_online_alter
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>オンライン・ラブレター</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>ラブレター オンライン</h1>
<div id="my-peer-id">部屋ID生成中...</div>

<div id="setup-container">
    <div class="input-group">
        <label>あなたの名前:</label>
        <input type="text" id="name-input" value="プレイヤー">
    </div>
    
    <hr style="border: 0; border-top: 1px solid #7f8c8d; margin: 20px 0;">
    
    <div class="input-group" id="host-setup" style="margin-bottom: 20px;">
        <button onclick="beHost()">親（ホスト）として部屋を作る</button>
    </div>

    <div class="input-group">
        <label>参加する部屋のID (数字8桁):</label>
        <input type="text" id="room-id-input" placeholder="ここに8桁の部屋IDを入力">
        <button id="join-btn" class="btn-secondary" style="margin-top: 10px;" onclick="joinRoom()">子（ゲスト）として参加する</button>
    </div>
</div>

<div id="game-container" style="display: none;">
    <div class="status-panel">
        <span id="deck-count">山札: --枚</span>
        <span id="role-display" style="color: #f1c40f;">-</span>
    </div>
    
    <div id="player-list"></div>
    
    <button id="start-game-btn" style="display: none; margin: 10px 0;" onclick="hostStartGame()">ゲームを開始する</button>
    <button id="next-round-btn" style="display: none; margin: 10px 0; background: #3498db;" onclick="hostNextRound()">次のラウンドを開始</button>
    <button id="reset-game-btn" style="display: none; margin: 10px 0; background: #e67e22;" onclick="hostResetEntireGame()">ゲームを完全にリセット</button>
    
    <div class="log-box" id="log-box"></div>
    
    <h3 id="hand-title" style="text-align:center; margin: 10px 0; display:none;">あなたの手札</h3>
    <div class="card-area" id="card-area"></div>

    <div id="card-tracker-container">
        <h3>全カードの使用状況 (使われたカードは暗くなります)</h3>
        <div id="card-tracker-list"></div>
    </div>
</div>

<div id="target-modal" class="modal">
    <div class="modal-content">
        <h3 id="modal-title">対象選択</h3>
        <div id="target-buttons"></div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
